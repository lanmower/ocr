[package]
name = "ocr"
version = "0.1.0"
edition = "2021"

[dependencies]
ocrs = "0.12"
rten = "0.24"
image = "0.25"
pdfium-render = "0.9"
rayon = "1.10"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
walkdir = "2"
ureq = { version = "3", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
