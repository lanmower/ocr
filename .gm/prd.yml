  status: pending
- title: Rewrite release.yml to ship a single artifact
  detail: 'Replace per-variant ZIP bundling with: cargo build --release, attach only target/release/ocr.exe to the GitHub release (tag ''latest''). Drop the llama-server fetching/extracting in CI — runtime does it now. Keep windows-latest runner. Result: one ~50 MB ocr.exe per release.'
