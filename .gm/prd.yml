- title: Add bootstrap module to ocr.exe
  detail: 'New src/bootstrap.rs that owns: (a) detect GPU via PowerShell Win32_VideoController, return variant cpu/cuda/vulkan; (b) define cache layout under exe-dir/.ocr-runtime/ holding llama-server/, model.gguf, mmproj.gguf, variant.txt; (c) download missing artifacts via ureq with progress to stderr; (d) extract llama-server + cudart zips using zip crate; (e) spawn llama-server as child process bound to 127.0.0.1:8080 with -ngl 99/0 per variant + --path pointing at embedded web/ extracted to runtime cache; (f) wait for /health to return ok before returning.'
  id: item-1779459700829
  status: pending
- title: Embed web UI in ocr.exe
  detail: Use include_bytes!("../web/index.html") (and any other web assets) so the single exe carries the chat UI. On bootstrap, write it to exe-dir/.ocr-runtime/web/ and pass --path to llama-server. No external web/ dir needed in distribution.
  id: item-1779459700837
  status: pending
- title: Wire ocr.exe CLI to ensure bootstrap runs
  detail: 'main.rs gains: if invoked with no args or with --serve, run bootstrap and keep llama-server running as foreground (this is the ''just run the exe'' mode that pops the webcam chat UI). If invoked with --input, run bootstrap (idempotent — only downloads what''s missing), then proceed with existing OCR batch pipeline. Default URL printed to stderr: http://127.0.0.1:8080/'
  id: item-1779459700842
  status: pending
- title: Add zip + indicatif dependencies to Cargo.toml
  detail: 'Add `zip = { version = "2", default-features = false, features = ["deflate"] }` for in-process extraction (no PowerShell dependency at runtime). Optional: `indicatif` for download progress bars; otherwise just stderr percentage prints.'
