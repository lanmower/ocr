  detail: 'Build the new ocr.exe, copy ONLY ocr.exe into a fresh C:\Users\user\AppData\Local\Temp\ocr-fresh\, run it, confirm: (a) GPU detection prints expected variant, (b) llama-server downloads + extracts, (c) model + mmproj download, (d) llama-server starts and /health returns ok, (e) webcam chat UI accessible at http://127.0.0.1:8080/. Witness: HTTP 200 from /health and from /.'
