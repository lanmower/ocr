- title: CI uploads auxiliary runtime assets once per release
  detail: 'User request: host mmproj-google_gemma-4-E2B-it-f16.gguf (~940 MB) and the three llama-server zips (cpu/cuda+cudart/vulkan) as assets on the same ''latest'' GitHub release alongside ocr.exe. Model gguf is 3.3 GB — exceeds 2 GB per-asset cap, so model still pulled from HuggingFace. CI downloads the upstream files, attaches to release. ocr.exe''s bootstrap prefers our release URL for mmproj + llama-server zips (faster + stable URLs) and falls back to upstream if 404. Witness: release page shows ocr.exe + mmproj.gguf + llama-cpu.zip + llama-cuda.zip + cudart.zip + llama-vulkan.zip.'
