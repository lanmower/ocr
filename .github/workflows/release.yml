name: release
on:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release

      - name: Download llama-server variants
        shell: pwsh
        run: |
          $base = "https://github.com/ggml-org/llama.cpp/releases/download/b8785"
          $variants = @("cpu","cuda","vulkan")
          $urls = @{
            cpu    = "$base/llama-b8785-bin-win-cpu-x64.zip"
            cuda   = "$base/llama-b8785-bin-win-cuda-12.4-x64.zip"
            vulkan = "$base/llama-b8785-bin-win-vulkan-x64.zip"
          }
          $cudart = "$base/cudart-llama-bin-win-cuda-12.4-x64.zip"
          New-Item -ItemType Directory -Force -Path tmp-llama | Out-Null
          foreach ($v in $variants) {
            $zip = "tmp-llama\llama-$v.zip"
            Invoke-WebRequest -Uri $urls[$v] -OutFile $zip
            $dir = "tmp-llama\$v-extracted"
            Expand-Archive -Force $zip $dir
            if ($v -eq "cuda") {
              $czip = "tmp-llama\cudart.zip"
              Invoke-WebRequest -Uri $cudart -OutFile $czip
              Expand-Archive -Force $czip $dir
            }
          }

      - name: Bundle release ZIPs
        shell: pwsh
        run: |
          $files = @("setup.bat","start.bat","ocr.bat","describe.bat","README.md")
          foreach ($variant in @("cpu","cuda","vulkan")) {
            $out = "ocr-$variant"
            New-Item -ItemType Directory -Force -Path $out | Out-Null
            foreach ($f in $files) {
              if (Test-Path $f) { Copy-Item $f $out\ }
            }
            Copy-Item target\release\ocr.exe $out\
            Copy-Item -Recurse web $out\web
            $llaDir = "tmp-llama\$variant-extracted"
            $dest = "$out\tmp-llama\b8785-extracted"
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Copy-Item "$llaDir\*" $dest -Recurse
            "$variant" | Out-File -Encoding ascii "$out\tmp-llama\variant.txt"
            Compress-Archive -Force -Path "$out\*" -DestinationPath "$out.zip"
          }

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: |
            ocr-cpu.zip
            ocr-cuda.zip
            ocr-vulkan.zip
