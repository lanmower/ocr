name: release
on:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release

      - name: Download auxiliary runtime assets
        shell: pwsh
        run: |
          $base = "https://github.com/ggml-org/llama.cpp/releases/download/b8785"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $assets = @{
            "llama-b8785-bin-win-cpu-x64.zip"     = "$base/llama-b8785-bin-win-cpu-x64.zip"
            "llama-b8785-bin-win-cuda-12.4-x64.zip" = "$base/llama-b8785-bin-win-cuda-12.4-x64.zip"
            "cudart-llama-bin-win-cuda-12.4-x64.zip" = "$base/cudart-llama-bin-win-cuda-12.4-x64.zip"
            "llama-b8785-bin-win-vulkan-x64.zip"  = "$base/llama-b8785-bin-win-vulkan-x64.zip"
            "gemma-4-E2B-it-mmproj.gguf" = "https://huggingface.co/google/gemma-4-E2B-it-qat-q4_0-gguf/resolve/main/gemma-4-E2B-it-mmproj.gguf"
          }
          foreach ($name in $assets.Keys) {
            $out = "dist\$name"
            Write-Host "fetch $name"
            Invoke-WebRequest -Uri $assets[$name] -OutFile $out
          }
          Copy-Item target\release\ocr.exe dist\ocr.exe

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: |
            dist/ocr.exe
            dist/llama-b8785-bin-win-cpu-x64.zip
            dist/llama-b8785-bin-win-cuda-12.4-x64.zip
            dist/cudart-llama-bin-win-cuda-12.4-x64.zip
            dist/llama-b8785-bin-win-vulkan-x64.zip
            dist/gemma-4-E2B-it-mmproj.gguf
