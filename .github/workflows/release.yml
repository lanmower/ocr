name: release
on:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Download runtime binaries
        run: curl -L -o llama-vulkan.zip https://github.com/ggml-org/llama.cpp/releases/download/b8740/llama-b8740-bin-win-vulkan-x64.zip
      - name: Extract runtime binaries
        shell: pwsh
        run: |
          Expand-Archive -Path llama-vulkan.zip -DestinationPath llama-vulkan-extracted -Force
          New-Item -ItemType Directory -Force -Path assets
          Copy-Item (Get-ChildItem -Path llama-vulkan-extracted -Recurse -Filter llama-mtmd-cli.exe).FullName assets/
          Copy-Item (Get-ChildItem -Path llama-vulkan-extracted -Recurse -Filter mtmd.dll).FullName assets/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: |
            target/release/ocr.exe
            assets/llama-mtmd-cli.exe
            assets/mtmd.dll
