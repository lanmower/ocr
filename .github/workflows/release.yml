name: release
on:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Download llama-gguf-split
        shell: pwsh
        run: |
          curl -L -o llama-vulkan.zip https://github.com/ggml-org/llama.cpp/releases/download/b8741/llama-b8741-bin-win-vulkan-x64.zip
          Expand-Archive -Path llama-vulkan.zip -DestinationPath llama-vulkan-extracted -Force
      - name: Download model and split
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path assets
          curl -L -H "Authorization: Bearer $env:HF_TOKEN" -o assets/model.gguf https://huggingface.co/bartowski/google_gemma-4-E2B-it-GGUF/resolve/main/google_gemma-4-E2B-it-Q4_K_M.gguf
          $split = (Get-ChildItem -Path llama-vulkan-extracted -Recurse -Filter llama-gguf-split.exe).FullName
          & $split --split-max-size 1900M assets/model.gguf assets/model
          Remove-Item assets/model.gguf
      - name: Download mmproj
        shell: pwsh
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          curl -L -H "Authorization: Bearer $env:HF_TOKEN" -o assets/mmproj-google_gemma-4-E2B-it-f16.gguf https://huggingface.co/bartowski/google_gemma-4-E2B-it-GGUF/resolve/main/mmproj-google_gemma-4-E2B-it-f16.gguf
      - name: List assets
        shell: pwsh
        run: Get-ChildItem assets | Select-Object Name, @{N='MB';E={[math]::Round($_.Length/1MB,1)}}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          files: |
            target/release/ocr.exe
            assets/model-00001-of-00003.gguf
            assets/model-00002-of-00003.gguf
            assets/model-00003-of-00003.gguf
            assets/mmproj-google_gemma-4-E2B-it-f16.gguf
